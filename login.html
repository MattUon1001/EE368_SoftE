<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
  <main class="w-full max-w-md mx-auto p-6">
    <div class="mt-7 bg-white rounded-xl shadow-lg border-2 border-indigo-300 p-6">

      <h1 class="text-2xl font-bold text-center mb-4">Login</h1>

      {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <p class="text-red-500 text-center mb-2">{{ message }}</p>
      {% endfor %}
      {% endwith %}

      <form method="POST">
        <input type="text" name="email" placeholder="Email" required
               class="w-full mb-2 p-2 border rounded">

        <input type="password" name="password" placeholder="Password" required
               class="w-full mb-4 p-2 border rounded">

        <button type="submit"
                class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600 transition">
          Login
        </button>
      </form>

      <div class="mt-4">
        <a href="{{ url_for('google_login') }}"
           class="w-full flex items-center justify-center gap-2 border border-gray-300 bg-white text-gray-700 p-2 rounded hover:bg-gray-50 transition border-2">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo" class="w-5 h-5">
          <span class="font-medium">Sign in with Google</span>
        </a>
      </div>

      <p class="mt-6 text-center">
        <a href="{{ url_for('register') }}" class="text-blue-600 hover:underline">Register</a>
        |
        <a href="{{ url_for('forgot_password') }}" class="text-blue-600 hover:underline">Forgot Password?</a>
      </p>

    </div>
  </main>
</body>
</html>
